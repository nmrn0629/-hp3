<body>

                </a>
            </h1>
            <nav class="nav">
                <ul class="nav-list">
                    <li class="nav-home"><a href="index.html">ホーム</a></li>

                </ul>

                    <span></span>
                    <span></span>

                </button>

        </div>
    </header>

    <main>
        <section class="page-header"
            style="padding-top: 120px; padding-bottom: 40px; text-align: center; background-color: var(--color-bg);">
            <div class="container">
                <h2 class="section-title">過去のTOPICS</h2>

        <section class="section" style="padding-top: 40px;">
            <div class="container">

            </div>

                <li><a href="privacy.html">プライバシーポリシー</a></li>

        </div>
    </footer>

    <script src="js/topics-data.js?v=1.09"></script>
    <script src="script.js?v=1.23"></script>
    <script>
        (function () {
            const container = document.getElementById('archive-list');
            if (!container || !window.topicsData) return;
            if (window.topicsData.length === 0) {
                container.innerHTML = '<p class="archive-empty">掲載中のTOPICSはありません。</p>';
                return;
            }

            const escapeHtml = function (str) {
                return String(str).replace(/[&<>"']/g, function (c) {
                    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
                });
            };

            const groups = {};
            const order = [];
            const sourceData = (window.topicsArchiveData || window.topicsData).slice();
            const latestTopic = sourceData.slice().sort(function (a, b) {
                return b.date.localeCompare(a.date);
            })[0];
            const latestParts = latestTopic.date.split('/');
            const latestMonth = parseInt(latestParts[0], 10) * 12 + parseInt(latestParts[1], 10);
            const oldestArchiveMonth = latestMonth - 11;
            const archiveData = sourceData.filter(function (topic) {
                const parts = topic.date.split('/');
                const topicMonth = parseInt(parts[0], 10) * 12 + parseInt(parts[1], 10);
                return topicMonth >= oldestArchiveMonth && topicMonth <= latestMonth;
            }).sort(function (a, b) {
                return b.date.localeCompare(a.date);
            });

            archiveData.forEach(function (topic) {
                const parts = topic.date.split('/');
                const key = parts[0] + '/' + parts[1];
                if (!groups[key]) {
                    groups[key] = { label: parts[0] + '年' + parseInt(parts[1], 10) + '月', items: [] };
                    order.push(key);
                }
                groups[key].items.push({ day: parts[2], content: topic.content, url: topic.url });
            });

            container.innerHTML = order.map(function (key, idx) {
                const group = groups[key];
                const itemsHtml = group.items.map(function (item) {
                    const linkHtml = item.url
                        ? '<a href="' + escapeHtml(item.url) + '" class="topics-link" target="_blank" rel="noopener">詳細</a>'
                        : '';
                    return '<li><span class="archive-day">' + escapeHtml(item.day) + '日</span>'
                        + '<span class="archive-content">' + escapeHtml(item.content) + '</span>'
                        + linkHtml + '</li>';
                }).join('');
                const openAttr = idx === 0 ? ' open' : '';
                return '<details class="archive-month"' + openAttr + '>'
                    + '<summary class="archive-month-summary">'
                    + '<span class="archive-month-label">' + escapeHtml(group.label) + '</span>'
                    + '<span class="archive-month-count">' + group.items.length + '件</span>'
                    + '</summary>'
                    + '<ul class="archive-list">' + itemsHtml + '</ul>'
                    + '</details>';
            }).join('');
        })();
    </script>

    <!-- Topics Floating Button -->
    <div id="topics-fab" class="topics-fab">
        <div class="topics-fab-img-wrapper">
            <img src="images/トピックス用金ロゴ.png" alt="事務所ロゴ">
            <span class="topics-label">TOPICS</span>
        </div>
    </div>

    <!-- Topics Speech Bubble -->
    <div id="topics-bubble" class="topics-bubble">
        <div class="topics-bubble-inner">

                <h3>TOPICS</h3>
                <button id="close-topics" class="close-topics-btn">&times;</button>
            </div>
            <div class="topics-bubble-body">
                <ul class="topics-list">
                    <!-- 内容は js/topics-data.js から自動読み込みされます -->
                </ul>
            </div>
        </div>
        <div class="topics-bubble-tail"></div>
    </div>
</body>
